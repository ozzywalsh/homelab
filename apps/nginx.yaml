apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-share-config
  namespace: qbitorrent
data:
  default.conf: |
    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            autoindex on;               # Enables the file browser UI
            autoindex_exact_size off;   # Shows file sizes in KB/MB/GB instead of raw bytes
            autoindex_localtime on;    # Shows file modification times in your local timezone
            
            # Optional: Prevents timeouts on massive file downloads
            client_max_body_size 0;
            sendfile on;
            tcp_nopush on;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-share
  namespace: qbitorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-share
  template:
    metadata:
      labels:
        app: nginx-share
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        # Mount the qBittorrent downloads PVC directly into Nginx's default webroot
        - name: shared-files
          mountPath: /usr/share/nginx/html
          readOnly: true # Good practice so Nginx can't accidentally delete or alter downloads
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: shared-files
        persistentVolumeClaim:
          claimName: qbittorrent-downloads-pvc
      - name: config
        configMap:
          name: nginx-share-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-share-web
  namespace: qbitorrent
spec:
  type: ClusterIP
  selector:
    app: nginx-share
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nginx-share
  namespace: qbitorrent
spec:
  entryPoints:
    - web 
  routes:
    - match: Host(`downloads.local`)
      kind: Rule
      services:
        - name: nginx-share-web
          port: 80