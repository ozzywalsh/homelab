apiVersion: v1
kind: Namespace
metadata:
  name: traefik
--
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 2h0m0s
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: traefik
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  install:
    createNamespace: true
  values:
    api:
      dashboard: true
    ingressRoute:
      dashboard:
        enabled: true
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
    service:
      spec:
        type: NodePort
