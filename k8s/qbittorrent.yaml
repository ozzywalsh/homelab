apiVersion: v1
kind: Namespace
metadata:
  name: qbitorrent
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-downloads-pvc
  namespace: qbitorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: qbitorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbitorrent
  template:
    metadata:
      labels:
        app: qbitorrent
    spec:
      containers:
      - name: qbittorrent
        image: lscr.io/linuxserver/qbittorrent:5.2.2
        env:
        - name: PUID
          value: "1000" # Maps to your host user
        - name: PGID
          value: "1000" # Maps to your host group
        - name: TZ
          value: "Europe/Dublin"
        - name: WEBUI_PORT
          value: "8080"
        ports:
          - containerPort: 8080
        volumeMounts:
          - name: downloads
            mountPath: /downloads
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads-pvc
