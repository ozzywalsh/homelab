apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./apps                      # Tell Flux to look at your new /apps folder
  prune: true                       # Automatically delete resources if you delete their files
  sourceRef:
    kind: GitRepository
    name: flux-system               # Reuses the Git source created during bootstrap
