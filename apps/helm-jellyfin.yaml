apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jellyfin
  namespace: qbitorrent
spec:
  interval: 2h0m0s
  url: https://jellyfin.github.io/jellyfin-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: qbitorrent
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: qbitorrent # for convenience; might change later
  install:
    createNamespace: true
  values:
    replicaCount: 1
    persistence:
      config:
        enabled: true
        size: 5Gi
        storageClass: 'local-path'
      media:
        enabled: true
        existingClaim: "qbittorrent-downloads-pvc"
    ingress:
      enabled: true
      className: 'traefik'
      hosts:
        - host: jellyfin.local
          paths:
            - path: /
              pathType: Prefix
